version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-openplaud}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    # Do not bind host ports in Coolify. Let Coolify's proxy route to port 3000.
    expose:
      - "3000"

    environment:
      # Required
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?}
      APP_URL: ${APP_URL:?}

      # Database (uses same creds as db service)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openplaud}

      # Storage (optional defaults)
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}

    volumes:
      - audio:/app/audio

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

volumes:
  pgdata:
    driver: local
  audio:
    driver: local
